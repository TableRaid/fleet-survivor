<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLEET SURVIVOR — 콘텐츠 에디터</title>
    <style>
      :root { --bg:#0c0f17; --panel:#161c28; --line:#26304a; --accent:#9ad8ff; --text:#dfe6f2; --muted:#8090a8; }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: monospace; font-size: 14px; }
      header { display:flex; align-items:center; gap:16px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); }
      header h1 { font-size:18px; margin:0; color:var(--accent); }
      header .sp { flex:1; }
      button { background:#222c40; color:var(--text); border:1px solid var(--line); border-radius:5px; padding:6px 12px; cursor:pointer; font-family:monospace; }
      button:hover { background:#2c3850; }
      button.primary { background:#2b6cb0; border-color:#3b82d0; }
      button.danger { background:#7a2b2b; border-color:#a04040; }
      .tabs { display:flex; gap:4px; padding:8px 16px 0; background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
      .tabs button { border-bottom:none; border-radius:6px 6px 0 0; }
      .tabs button.active { background:var(--bg); color:var(--accent); border-color:var(--line); }
      main { display:grid; grid-template-columns: 1fr 460px; gap:0; height: calc(100vh - 96px); }
      #panel { padding:16px; overflow:auto; }
      #side { border-left:1px solid var(--line); background:#0a0d14; padding:12px; overflow:auto; }
      #preview { width:100%; height:300px; background:#05060a; border:1px solid var(--line); border-radius:6px; }
      .row { display:flex; align-items:center; gap:8px; margin:6px 0; }
      .row label { width:120px; color:var(--muted); }
      input[type=text], input[type=number], select { background:#0d1119; color:var(--text); border:1px solid var(--line); border-radius:4px; padding:5px 7px; font-family:monospace; }
      input[type=number]{ width:90px; } input[type=text]{ width:200px; }
      .list { display:flex; flex-direction:column; gap:4px; margin:8px 0; }
      .item { display:flex; align-items:center; gap:8px; padding:6px 8px; background:#10151f; border:1px solid var(--line); border-radius:5px; cursor:pointer; }
      .item.sel { border-color:var(--accent); }
      .item img { width:28px; height:28px; image-rendering: pixelated; background:#000; }
      .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
      .asset { text-align:center; background:#10151f; border:1px solid var(--line); border-radius:5px; padding:6px; }
      .asset img { width:48px; height:48px; image-rendering:pixelated; background:#000; }
      .asset .k { font-size:11px; color:var(--muted); word-break:break-all; }
      .layer { border:1px solid var(--line); border-radius:5px; padding:8px; margin:6px 0; background:#10151f; }
      h3 { color:var(--accent); margin:14px 0 6px; border-bottom:1px solid var(--line); padding-bottom:4px; }
      .hint { color:var(--muted); font-size:12px; margin:4px 0; }
      .toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#2b6cb0; padding:8px 16px; border-radius:6px; opacity:0; transition:opacity .2s; }
      .toast.show { opacity:1; }
      .helpbox { background:#11203a; border:1px solid #2b4a78; border-radius:8px; padding:11px 14px; margin:6px 0 14px; color:#bcd6f5; font-size:13px; line-height:1.7; }
      .helpbox div::before { content:'· '; color:#5e9bd6; }
      button.big { font-size:16px; padding:12px 20px; margin:6px 0; }
      .asset img { width:48px; height:48px; image-rendering:pixelated; background:#0a0d14; border-radius:4px; }
    </style>
    <script type="module" crossorigin src="./assets/editor-BV3g61ai.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/Parallax-Br230djg.js">
  </head>
  <body>
    <header>
      <h1>FLEET SURVIVOR · 콘텐츠 에디터</h1>
      <span class="hint">기본 콘텐츠가 들어있어요 · 수정 후 [저장] → 게임 새로고침하면 반영</span>
      <span class="sp"></span>
      <button id="btnImport" title="내보낸 파일을 다시 불러옵니다(선택)">파일 불러오기</button>
      <button id="btnExport" title="현재 작업을 파일로 백업합니다(선택)">파일로 백업</button>
      <button class="primary" id="btnSave">저장</button>
      <a href="./index.html"><button>게임 실행 ▶</button></a>
    </header>
    <div class="tabs" id="tabs"></div>
    <main>
      <div id="panel"></div>
      <div id="side">
        <div class="hint">미리보기</div>
        <div id="preview"></div>
        <div id="sideExtra"></div>
      </div>
    </main>
    <input type="file" id="fileAssets" accept="image/*" multiple style="display:none" />
    <input type="file" id="fileImport" accept="application/json" style="display:none" />
    <div class="toast" id="toast"></div>
  </body>
</html>
